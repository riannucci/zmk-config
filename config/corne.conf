# Key debounce intentionally left at ZMK defaults (5 ms press / 5 ms release).
# A previous 1 ms press override let switch bounce through as repeated keys
# (a single press registering twice, e.g. the D key). ZMK recommends >= the
# default when a key registers multiple inputs. Do not re-add an aggressive
# press override; if chatter persists at the default the hot-swap socket or
# switch is likely at fault (reseat/replace it).
