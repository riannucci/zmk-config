# --- YADS Display Configuration ---
CONFIG_DONGLE_SCREEN_HORIZONTAL=y
CONFIG_DONGLE_SCREEN_FLIPPED=n

# 0 = macOS icon, 1 = Linux, 2 = Windows
CONFIG_DONGLE_SCREEN_SYSTEM_ICON=0

# Screen brightness (1-100)
CONFIG_DONGLE_SCREEN_MAX_BRIGHTNESS=100
CONFIG_DONGLE_SCREEN_MIN_BRIGHTNESS=10
CONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=50

# Idle timeout: dim after 5 minutes of inactivity
CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=300

# Keyboard brightness control (F22 = toggle, F23 = down, F24 = up)
CONFIG_DONGLE_SCREEN_BRIGHTNESS_KEYBOARD_CONTROL=y

# Widget toggles (disable what you don't want)
CONFIG_DONGLE_SCREEN_WPM_ACTIVE=n
CONFIG_DONGLE_SCREEN_MODIFIER_ACTIVE=y
CONFIG_DONGLE_SCREEN_LAYER_ACTIVE=y
CONFIG_DONGLE_SCREEN_OUTPUT_ACTIVE=y
CONFIG_DONGLE_SCREEN_BATTERY_ACTIVE=y

# --- General ZMK Settings ---
# Increase BLE TX power for better range (optional)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
