# Derived from zmk,behavior-caps-word.yaml. Adds `shift-list`.

description: Extended caps word behavior (caps_word plus a shift-list and unshift-list)

compatible: "zmk,behavior-ecaps-word"

include: zero_param.yaml

properties:
  continue-list:
    type: array
    required: true
  shift-list:
    type: array
  unshift-list:
    type: array
  mods:
    type: int
